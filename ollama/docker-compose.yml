services:
  ollama:
    image: ollama/ollama:0.20.0
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    entrypoint: >
      /bin/sh -c "ollama serve &
      sleep 5 &&
      ollama pull gemma4:31b &&
      wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama

volumes:
  open-webui-data: